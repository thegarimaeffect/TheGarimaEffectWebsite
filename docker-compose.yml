# =============================================================================
# The Garima Effect — full local stack
#
# Supabase (Auth/DB/Storage/Realtime) is managed by the Supabase CLI on a
# separate compose project ("supabase_<id>_the-garima-effect" containers).
# This file builds and runs ONLY the frontend, then talks to Supabase on the
# host via host.docker.internal:54321.
#
# Bring everything up:
#   1) cd backend && npm run start        # Supabase (one-time per session)
#   2) docker compose up -d --build       # Frontend in a container
#
# Stop:
#   docker compose down
#   cd backend && npm run stop
# =============================================================================

services:
  frontend:
    container_name: garima-frontend
    build:
      context: ./frontend
      args:
        # The BROWSER reaches Supabase via the host's localhost (port-forwarded
        # by Docker Desktop). These are inlined into the JS bundle.
        NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    environment:
      # The SERVER inside the container reaches Supabase via host.docker.internal
      SUPABASE_SERVER_URL: http://host.docker.internal:54321
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      # Service-role key — bypasses RLS. Only used when ALLOW_PREVIEW=1 + valid preview cookie.
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      ALLOW_PREVIEW: "1"
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NODE_ENV: production
    extra_hosts:
      # Lets host.docker.internal work on Linux too (already auto-mapped on Mac/Windows)
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
